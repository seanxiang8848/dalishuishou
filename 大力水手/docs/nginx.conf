server {
    listen 80;
    server_name seanxiangchao.top www.seanxiangchao.top;

    # 日志
    access_log /var/log/nginx/dalishuishou-access.log;
    error_log /var/log/nginx/dalishuishou-error.log;

    # 静态文件
    location /uploads/ {
        alias /root/.openclaw/workspace/大力水手/backend/uploads/;
        expires 30d;
    }

    # API代理
    location /api/ {
        proxy_pass http://localhost:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 健康检查
    location /health {
        proxy_pass http://localhost:3000/health;
    }

    # 根路径
    location / {
        return 200 '{"message": "大力水手 API 服务正常运行", "domain": "seanxiangchao.top"}';
        add_header Content-Type application/json;
    }
}

