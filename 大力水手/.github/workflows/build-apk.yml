name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Debug - Check repository structure
      run: |
        echo "=== Current Directory ==="
        pwd
        ls -la
        echo "=== Root Directory ==="
        ls -la /
        echo "=== Check if android exists ==="
        if [ -d "android" ]; then
          echo "android directory exists"
          ls -la android/
        else
          echo "android directory NOT FOUND"
        fi
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Decode Keystore
      run: |
        mkdir -p android
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/dalishuishou.keystore
        ls -la android/
    
    - name: Create Signing Properties
      run: |
        cat > android/signing.properties << EOF
        RELEASE_STORE_FILE=dalishuishou.keystore
        RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
        RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
        EOF
        cat android/signing.properties
    
    - name: Build APK
      run: |
        cd android
        ls -la
        chmod +x gradlew
        ./gradlew assembleRelease --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-release-apk
        path: android/app/build/outputs/apk/release/*.apk
