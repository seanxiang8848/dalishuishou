name: Build Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create release'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/dalishuishou.keystore
    
    - name: Create Signing Properties
      run: |
        cat > android/signing.properties << EOF
        RELEASE_STORE_FILE=dalishuishou.keystore
        RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
        RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
        EOF
    
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
    
    - name: Build Release APK
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon
    
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Get version info
      id: version
      run: |
        echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
        echo "time=$(date +'%H%M%S')" >> $GITHUB_OUTPUT
    
    - name: Create Release
      if: github.event.inputs.release == 'true' || github.ref_type == 'tag'
      uses: softprops/action-gh-release@v1
      with:
        name: "大力水手 v1.0.0-${{ steps.version.outputs.date }}"
        tag_name: "v1.0.0-${{ steps.version.outputs.date }}-${{ steps.version.outputs.time }}"
        files: android/app/build/outputs/apk/release/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
