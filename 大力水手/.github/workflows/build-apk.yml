name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Verify structure
      run: |
        echo "Current directory:"
        pwd
        ls -la
        echo "Android directory:"
        ls -la android/ 2>/dev/null || echo "android dir not found"
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - uses: android-actions/setup-android@v3
    
    - name: Create android directory
      run: mkdir -p android
    
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/dalishuishou.keystore
        ls -la android/dalishuishou.keystore
    
    - name: Create Signing Properties
      run: |
        cat > android/signing.properties << EOF
        RELEASE_STORE_FILE=dalishuishou.keystore
        RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
        RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
        EOF
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-release-apk
        path: android/app/build/outputs/apk/release/*.apk
