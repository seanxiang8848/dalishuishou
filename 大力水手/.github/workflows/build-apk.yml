name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
    
    - name: Decode Keystore
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/dalishuishou.keystore
    
    - name: Create Signing Properties
      run: |
        cat > android/signing.properties << EOF
        RELEASE_STORE_FILE=dalishuishou.keystore
        RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
        RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
        EOF
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: android/app/build/outputs/apk/release/*.apk
      if: always()
