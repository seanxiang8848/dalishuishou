name: Guaranteed APK Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'debug'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Debug - Show full structure
      run: |
        echo "=== 完整项目结构 ==="
        find . -type f -name "*.gradle" -o -name "gradlew" -o -name "*.apk" | head -20
        echo "=== 大力水手目录 ==="
        ls -la "大力水手/" || echo "目录不存在"
        echo "=== Android 目录 ==="
        ls -la "大力水手/android/" || echo "目录不存在"
    
    - name: Clean and build with detailed output
      run: |
        cd "大力水手/android"
        chmod +x gradlew
        
        echo "=== 1. 显示 Gradle 版本 ==="
        ./gradlew --version
        
        echo "=== 2. 清理项目 ==="
        ./gradlew clean
        
        echo "=== 3. 构建 Debug APK（详细输出）==="
        ./gradlew assembleDebug --stacktrace --info 2>&1 | tail -200
        
        echo "=== 4. 验证 APK 生成 ==="
        find . -name "*.apk" -type f 2>/dev/null
        
        echo "=== 5. 检查 build 目录 ==="
        find . -path "*/build/outputs/apk/*" -type f 2>/dev/null | head -10
    
    - name: Find and prepare APK
      id: find-apk
      run: |
        echo "=== 搜索 APK 文件 ==="
        cd "大力水手/android"
        
        # 搜索所有可能的 APK 位置
        APK_PATHS=()
        for pattern in "app/build/outputs/apk/debug/*.apk" \
                       "app/build/outputs/apk/*/*.apk" \
                       "*/build/outputs/apk/*/*.apk" \
                       "*.apk"; do
            for file in $(find . -name "$(basename "$pattern")" -type f 2>/dev/null | head -5); do
                if [ -f "$file" ]; then
                    APK_PATHS+=("$file")
                    echo "找到: $file ($(ls -lh "$file" | awk '{print $5}'))"
                fi
            done
        done
        
        if [ ${#APK_PATHS[@]} -eq 0 ]; then
            echo "❌ 未找到任何 APK 文件"
            echo "构建可能失败了"
            exit 1
        else
            # 使用第一个找到的 APK
            APK_FILE="${APK_PATHS[0]}"
            echo "✅ 使用 APK: $APK_FILE"
            
            # 复制到工作目录
            cp "$APK_FILE" "$GITHUB_WORKSPACE/app-built.apk"
            echo "APK 已复制到: $GITHUB_WORKSPACE/app-built.apk"
            ls -lh "$GITHUB_WORKSPACE/app-built.apk"
            
            # 设置输出
            echo "apk_path=$APK_FILE" >> $GITHUB_OUTPUT
            echo "apk_size=$(stat -c%s "$APK_FILE")" >> $GITHUB_OUTPUT
        fi
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: dalishuishou-apk
        path: ${{ github.workspace }}/app-built.apk
        retention-days: 7
    
    - name: Verify upload
      run: |
        echo "=== 验证 APK 文件 ==="
        if [ -f "$GITHUB_WORKSPACE/app-built.apk" ]; then
            echo "✅ APK 文件存在"
            ls -lh "$GITHUB_WORKSPACE/app-built.apk"
            file "$GITHUB_WORKSPACE/app-built.apk"
        else
            echo "❌ APK 文件不存在"
            exit 1
        fi
