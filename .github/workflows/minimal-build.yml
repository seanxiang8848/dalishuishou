name: Minimal Build Test

on:
  workflow_dispatch:
    inputs:
      test:
        description: 'Test minimal build'
        required: false
        default: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Test minimal Gradle commands
      run: |
        echo "=== 进入项目目录 ==="
        cd "大力水手/android"
        pwd
        ls -la
        
        echo "=== 1. 测试 gradlew 基本功能 ==="
        chmod +x gradlew
        ./gradlew --version || echo "gradlew --version 失败"
        
        echo "=== 2. 测试最简单的任务 ==="
        ./gradlew tasks --all 2>&1 | tail -50 || echo "gradlew tasks 失败"
        
        echo "=== 3. 检查项目配置 ==="
        echo "--- settings.gradle ---"
        head -20 settings.gradle || echo "settings.gradle 不存在"
        echo "--- build.gradle ---"
        head -30 build.gradle || echo "build.gradle 不存在"
        echo "--- app/build.gradle ---"
        head -50 app/build.gradle 2>/dev/null || echo "app/build.gradle 不存在"
        
        echo "=== 4. 尝试构建单个模块 ==="
        ./gradlew :app:assembleDebug --dry-run 2>&1 | tail -30 || echo "dry-run 失败"
    
    - name: Check Android configuration
      run: |
        cd "大力水手/android"
        echo "=== 检查 Android 配置 ==="
        
        # 检查 local.properties
        if [ -f "local.properties" ]; then
            echo "local.properties 存在"
            head -10 local.properties
        else
            echo "local.properties 不存在（正常）"
        fi
        
        # 检查 gradle.properties
        if [ -f "gradle.properties" ]; then
            echo "gradle.properties 存在"
            grep -i "android\|sdk\|version" gradle.properties | head -10
        fi
        
        # 检查签名配置
        if [ -f "signing.properties" ]; then
            echo "signing.properties 存在"
        else
            echo "signing.properties 不存在"
        fi
