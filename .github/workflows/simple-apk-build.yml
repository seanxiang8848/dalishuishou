name: Build APK (No Signing)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'debug'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Debug - List files
      run: |
        echo "=== 项目结构 ==="
        find "大力水手" -name "*.gradle" -o -name "gradlew" | head -10
        echo "=== 进入目录 ==="
        cd "大力水手/android"
        pwd
        ls -la
    
    - name: Build Debug APK (No signing required)
      run: |
        cd "大力水手/android"
        chmod +x gradlew
        ./gradlew assembleDebug
      
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: "大力水手/android/app/build/outputs/apk/debug/*.apk"
        retention-days: 7
